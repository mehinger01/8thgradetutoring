<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grade 8 Test Prep Tutor</title>
<style>
:root{--bg:#0b1020;--card:#141b34;--card2:#10182e;--text:#f4f7fb;--muted:#aeb8d0;--accent:#6ee7f9;--good:#62d394;--warn:#ffd166;--bad:#ff6b6b;--line:#26314f}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top,#1a2a52 0,#0b1020 45%,#070b16 100%);color:var(--text)}header{padding:22px 20px;border-bottom:1px solid var(--line);background:rgba(10,15,30,.8);position:sticky;top:0;z-index:5;backdrop-filter:blur(10px)}h1{margin:0;font-size:24px}header p{margin:6px 0 0;color:var(--muted)}main{max-width:1150px;margin:0 auto;padding:22px}.tabs{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}.tab{border:1px solid var(--line);background:#10182e;color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer}.tab.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(110,231,249,.12)}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{grid-column:span 12;background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,.22)}.half{grid-column:span 6}.third{grid-column:span 4}@media(max-width:800px){.half,.third{grid-column:span 12}}button{background:var(--accent);color:#041018;border:0;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer}button.secondary{background:#24304f;color:var(--text);border:1px solid var(--line)}button.danger{background:var(--bad);color:#230000}button:disabled{opacity:.45;cursor:not-allowed}.choices{display:grid;gap:10px;margin-top:14px}.choice{background:#0e1529;border:1px solid var(--line);color:var(--text);padding:13px;border-radius:14px;text-align:left}.choice:hover{border-color:var(--accent)}.choice.selected{border-color:var(--accent);background:#10233b}.pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;background:#0d1428;border:1px solid var(--line);color:var(--muted);font-size:13px;margin:4px 5px 4px 0}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}.bar{height:12px;background:#0b1020;border:1px solid var(--line);border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--bad),var(--warn),var(--good));width:50%}input[type=range]{width:100%}.slider-row{display:grid;grid-template-columns:170px 1fr 42px;gap:10px;align-items:center;margin:12px 0}.muted{color:var(--muted)}.big{font-size:34px;font-weight:900}.question{font-size:20px;line-height:1.45}.hint{border-left:4px solid var(--warn);padding:12px;background:#171829;border-radius:10px;margin-top:12px}.success{border-left:4px solid var(--good);padding:12px;background:#11251e;border-radius:10px;margin-top:12px}.error{border-left:4px solid var(--bad);padding:12px;background:#2a1218;border-radius:10px;margin-top:12px}textarea{width:100%;min-height:260px;border-radius:14px;border:1px solid var(--line);background:#080d1b;color:var(--text);padding:12px}.small{font-size:13px}.badge{display:inline-block;margin:5px;padding:8px 10px;border-radius:999px;background:#17213d;border:1px solid var(--line)}.badge.earned{background:#143624;border-color:#2a9156}.hidden{display:none}.lock{max-width:360px;display:flex;gap:8px}input{border-radius:12px;border:1px solid var(--line);padding:11px;background:#080d1b;color:var(--text);width:100%}
</style>
</head><body>
<header><h1>Grade 8 Test Prep Tutor</h1><p>Anonymous diagnostic + targeted practice for state-test style readiness.</p></header>
<main>
<div class="tabs"><button class="tab active" data-tab="student">Student Diagnostic</button><button class="tab" data-tab="practice">Practice Arena</button><button class="tab" data-tab="tutor">Tutor Dashboard</button><button class="tab" data-tab="progress">Progress</button></div>
<section id="student" class="view"></section><section id="practice" class="view hidden"></section><section id="tutor" class="view hidden"></section><section id="progress" class="view hidden"></section>
</main>
<script>
const skills=['Expressions & Equations','Functions','Geometry','Number Sense','Statistics/Probability','Test Stamina'];
const defaults=()=>({sliders:Object.fromEntries(skills.map(s=>[s,50])),diagnosticDone:false,diagnosticAnswers:[],practiceAnswers:[],streak:0,bossUnlocked:false,badges:[],session:Date.now()});
let state=JSON.parse(localStorage.getItem('g8TutorState')||'null')||defaults();
function save(){localStorage.setItem('g8TutorState',JSON.stringify(state));}
const diag=[
{skill:'Statistics/Probability',diff:1,q:'A scatter plot shows points that generally rise from left to right in a nearly straight pattern. What association is shown?',c:['Negative linear','Positive linear','Positive nonlinear','No association'],a:1,h:['Look at direction first.','Rising left to right means positive.','If it follows a line pattern, it is linear.']},
{skill:'Geometry',diff:2,q:'A right rectangular pyramid is sliced by a vertical plane through its top vertex and base. What 2D shape is most likely formed?',c:['Circle','Rectangle','Triangle','Hexagon'],a:2,h:['Think about a slice through the point of a pyramid.','The cross section narrows to the top vertex.','A vertical slice through the vertex forms a triangle.']},
{skill:'Geometry',diff:3,q:'A kite string is the hypotenuse of a right triangle. The horizontal distance is 24 ft and the vertical height is 18 ft. Which equation finds the string length s?',c:['s = 24 + 18','s² = 24² + 18²','24² = s² + 18²','s = 24² + 18²'],a:1,h:['This is a right triangle.','Use a² + b² = c².','The string is the hypotenuse, so it is c or s.']},
{skill:'Expressions & Equations',diff:2,q:'A line crosses the y-axis at 3 and has slope -1/2. Which equation matches?',c:['y = 3x - 1/2','y = -1/2x + 3','y = 1/2x + 3','y = -2x + 3'],a:1,h:['Use y = mx + b.','m is slope and b is y-intercept.','m = -1/2 and b = 3.']},
{skill:'Geometry',diff:2,q:'A sphere has diameter 10 cm. Which value is used as the radius in the volume formula?',c:['5','10','20','100'],a:0,h:['Radius is half of diameter.','Diameter goes all the way across.','Half of 10 is 5.']},
{skill:'Number Sense',diff:2,q:'Which number is irrational?',c:['0.75','√49','π','-3'],a:2,h:['Rational numbers can be written as fractions.','Perfect square roots are rational.','π is nonrepeating and nonterminating.']},
{skill:'Expressions & Equations',diff:3,q:'Which expression is equivalent to 2³ · 2⁴?',c:['2⁷','2¹²','4⁷','4¹²'],a:0,h:['Same base multiplication: add exponents.','3 + 4 = 7.','Keep the base 2.']},
{skill:'Geometry',diff:3,q:'A point A(-3,4) is dilated by scale factor 2 from the origin. What is A′?',c:['(-1,6)','(-6,8)','(-5,4)','(6,-8)'],a:1,h:['Dilations from origin multiply both coordinates.','Multiply x and y by 2.','(-3×2, 4×2) = (-6,8).']},
{skill:'Functions',diff:2,q:'A table has x-values -2, -1, 0, 1, 2 with exactly one y-value for each x-value. What does this show?',c:['It is not a function','It is a function','It is always nonlinear','It has no rate of change'],a:1,h:['Function means each input has one output.','Repeated outputs are okay.','Repeated inputs with different outputs are not okay.']},
{skill:'Functions',diff:3,q:'A table shows total cost: 2 hours = $34, 4 hours = $58. What is the hourly rate?',c:['$6','$12','$24','$46'],a:1,h:['Hourly rate is change in cost divided by change in hours.','58 - 34 = 24 and 4 - 2 = 2.','24 ÷ 2 = 12.']},
{skill:'Expressions & Equations',diff:4,q:'Solve: 3x + 5 = 20',c:['x = 5','x = 15','x = 25','x = 8'],a:0,h:['Undo addition first.','20 - 5 = 15.','3x = 15, so x = 5.']},
{skill:'Geometry',diff:4,q:'In a right triangle, the legs are 5 and 12. What is the hypotenuse?',c:['13','17','60','169'],a:0,h:['Use a² + b² = c².','25 + 144 = 169.','√169 = 13.']},
{skill:'Functions',diff:4,q:'Which function is nonlinear?',c:['y = 3x + 2','y = -x','y = x² + 1','y = 7x'],a:2,h:['Linear functions have x to the first power.','Look for an exponent on x.','x² makes it nonlinear.']},
{skill:'Statistics/Probability',diff:3,q:'A trend line goes through about (0,10) and (5,25). What is the slope?',c:['1','2','3','5'],a:2,h:['Slope = rise/run.','25 - 10 = 15 and 5 - 0 = 5.','15 ÷ 5 = 3.']},
{skill:'Number Sense',diff:3,q:'√4 + √10 is closest to which whole number?',c:['3','4','5','7'],a:2,h:['√4 = 2.','√10 is a little more than 3.','2 + 3.16 is about 5.']},
{skill:'Geometry',diff:3,q:'Reflect point B(-4,-1) over the y-axis. What is B′?',c:['(4,-1)','(-4,1)','(4,1)','(-1,-4)'],a:0,h:['Reflection over y-axis changes x sign.','The y-value stays the same.','(-4,-1) becomes (4,-1).']},
{skill:'Expressions & Equations',diff:4,q:'For what value of k would 2x + 5 = 2x + k have infinitely many solutions?',c:['0','2','5','7'],a:2,h:['Infinitely many solutions means both sides are identical.','The 2x terms already match.','So constants must match: k = 5.']},
{skill:'Statistics/Probability',diff:4,q:'A line of best fit is useful because it...',c:['connects every point exactly','models the overall trend','removes outliers automatically','makes all data linear'],a:1,h:['Best fit lines summarize data.','They do not need to touch every point.','They model the overall relationship.']}
];
const practice=[...diag,{skill:'Functions',diff:4,q:'Kaley sleeps 32 hours in 4 nights. Mark sleeps 45 hours in 5 nights. Who sleeps more per night?',c:['Kaley','Mark','Same amount','Cannot tell'],a:1,h:['Find unit rate for each.','Kaley: 32 ÷ 4 = 8. Mark: 45 ÷ 5 = 9.','Mark sleeps more per night.']},{skill:'Geometry',diff:5,q:'A student writes 5² + 4² = 3² for a right triangle with sides 3, 4, and 5. What is the error?',c:['They added wrong','They used the hypotenuse as a leg','They should multiply all sides','There is no error'],a:1,h:['The longest side is the hypotenuse.','The hypotenuse must be alone on one side of the equation.','Correct: 3² + 4² = 5².']}];
let diagIndex=0, currentPractice=null, selected=null, attempts=0;
function show(tab){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(tab).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));render();}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>show(b.dataset.tab));
function skillScore(skill){let ans=state.diagnosticAnswers.filter(x=>x.skill===skill); if(!ans.length)return 50; return Math.round(ans.filter(x=>x.correct).length/ans.length*100);}
function recompute(){skills.slice(0,5).forEach(s=>state.sliders[s]=skillScore(s)); state.sliders['Test Stamina']=Math.min(95,50+state.diagnosticAnswers.filter(x=>x.correct).length*3); save();}
function startDiag(){state.diagnosticAnswers=[]; state.diagnosticDone=false; diagIndex=0; save(); render();}
function answerDiag(i){let q=diag[diagIndex]; state.diagnosticAnswers.push({skill:q.skill,correct:i===q.a,q:q.q}); if(diagIndex<11){diagIndex++;}else{let uneven=skills.slice(0,5).some(s=>skillScore(s)<50)&&state.diagnosticAnswers.length<18;if(uneven&&diagIndex<17){diagIndex++;}else{state.diagnosticDone=true;recompute();show('tutor');return;}} save(); render();}
function level(){let avg=Math.round(Object.values(state.sliders).reduce((a,b)=>a+b,0)/skills.length); if(avg<45)return 'Foundational'; if(avg<70)return 'Developing'; if(avg<85)return 'Proficient'; return 'Advanced';}
function weakest(){return skills.slice(0,5).sort((a,b)=>state.sliders[a]-state.sliders[b])[0];}
function launchPractice(){state.bossUnlocked=false; save(); show('practice'); nextPractice();}
function nextPractice(){let weak=weakest(); let pool=practice.filter(q=>q.skill===weak || q.diff<=Math.ceil(state.sliders[weak]/20)+2); currentPractice=pool[Math.floor(Math.random()*pool.length)]||practice[0]; selected=null; attempts=0; render();}
function submitPractice(){if(selected===null)return; let correct=selected===currentPractice.a; attempts++; if(correct){state.streak++; state.practiceAnswers.push({skill:currentPractice.skill,correct:true,attempts}); if(state.streak>=4){state.bossUnlocked=true; if(!state.badges.includes('Boss Level Unlocked')) state.badges.push('Boss Level Unlocked');} if(attempts===1&&!state.badges.includes('First Try Focus'))state.badges.push('First Try Focus'); save(); render();}else{state.streak=0; state.practiceAnswers.push({skill:currentPractice.skill,correct:false,attempts}); save(); render();}}
function copyReport(){navigator.clipboard.writeText(reportText()).then(()=>alert('Report copied. Paste into Notion or session notes.'));}
function reportText(){let lines=['Grade 8 Diagnostic Report','Session: '+new Date(state.session).toLocaleString(),'Estimated Level: '+level(),'','Skill Profile:']; skills.forEach(s=>lines.push('- '+s+': '+state.sliders[s]+'/100')); lines.push('','Tutor Notes:','Primary focus: '+weakest()+'. Use short cycles: model one, do one together, independent attempt, then quick feedback.','Student-Friendly Summary:','You have a starting map. The goal is not perfection today. We are going to build points by improving one skill at a time and turning mistakes into clues.'); return lines.join('\n');}
function resetAll(){if(confirm('Reset local data?')){state=defaults();save();location.reload();}}
function renderStudent(){let el=document.getElementById('student'); if(!state.diagnosticAnswers.length&&!state.diagnosticDone){el.innerHTML=`<div class="grid"><div class="card"><h2>Quick Diagnostic</h2><p class="muted">This starts with 12 state-test style questions and can expand toward 18 if the profile needs more evidence.</p><button onclick="startDiag()">Start Diagnostic</button></div></div>`;return;} if(!state.diagnosticDone){let q=diag[diagIndex]; el.innerHTML=`<div class="grid"><div class="card"><span class="pill">Question ${diagIndex+1}</span><span class="pill">${q.skill}</span><span class="pill">Difficulty ${q.diff}</span><p class="question">${q.q}</p><div class="choices">${q.c.map((x,i)=>`<button class="choice" onclick="answerDiag(${i})">${String.fromCharCode(65+i)}. ${x}</button>`).join('')}</div></div></div>`;return;} el.innerHTML=`<div class="grid"><div class="card"><h2>Diagnostic Complete</h2><p class="big">${level()}</p><p class="muted">Your tutor will check the report, adjust the practice level, and launch targeted practice.</p><button onclick="show('practice')">Go to Practice</button> <button class="secondary" onclick="show('tutor')">Tutor Dashboard</button></div></div>`;}
function renderTutor(){let el=document.getElementById('tutor'); if(!sessionStorage.getItem('tutorOK')){el.innerHTML=`<div class="card"><h2>Tutor Dashboard</h2><p class="muted">Enter tutor passcode.</p><div class="lock"><input id="pass" placeholder="passcode"><button onclick="if(document.getElementById('pass').value==='tutor'){sessionStorage.setItem('tutorOK','1');render()}else alert('Wrong passcode')">Unlock</button></div></div>`;return;} el.innerHTML=`<div class="grid"><div class="card half"><h2>Diagnostic Report</h2><p class="big">${level()}</p><p>Primary focus: <b>${weakest()}</b></p>${skills.map(s=>`<p><b>${s}</b> <span class="muted">${state.sliders[s]}/100</span></p><div class="bar"><div class="fill" style="width:${state.sliders[s]}%"></div></div>`).join('')}</div><div class="card half"><h2>Manual Fine-Tuning Sliders</h2>${skills.map(s=>`<div class="slider-row"><label>${s}</label><input type="range" min="0" max="100" value="${state.sliders[s]}" oninput="state.sliders['${s}']=+this.value;this.nextElementSibling.textContent=this.value;save()"><span>${state.sliders[s]}</span></div>`).join('')}<button onclick="launchPractice()">Launch Targeted Practice</button> <button class="secondary" onclick="copyReport()">Copy Report</button><div class="hint"><b>Student-friendly summary:</b> We now know where to focus. We are going to build points one skill at a time.</div></div><div class="card"><h2>Notion-Friendly Report</h2><textarea readonly>${reportText()}</textarea></div></div>`;}
function renderPractice(){let el=document.getElementById('practice'); if(!currentPractice) nextPractice(); let q=currentPractice; let last=state.practiceAnswers[state.practiceAnswers.length-1]; el.innerHTML=`<div class="grid"><div class="card"><span class="pill">Target: ${q.skill}</span><span class="pill">Streak: ${state.streak}</span><span class="pill">Attempts: ${attempts}/3</span><p class="question">${q.q}</p><div class="choices">${q.c.map((x,i)=>`<button class="choice ${selected===i?'selected':''}" onclick="selected=${i};render()">${String.fromCharCode(65+i)}. ${x}</button>`).join('')}</div><p><button onclick="submitPractice()">Submit</button> <button class="secondary" onclick="nextPractice()">Next Problem</button></p>${attempts>0&&selected!==q.a?`<div class="hint"><b>Hint ${Math.min(attempts,3)}:</b> ${q.h[Math.min(attempts-1,q.h.length-1)]}</div>`:''}${attempts>0&&selected===q.a?`<div class="success"><b>Correct.</b> Nice work. ${state.bossUnlocked?'Boss level is unlocked.':''}</div>`:''}${state.bossUnlocked?`<div class="card" style="margin-top:14px"><h2>Boss Level Unlocked</h2><p>Solve two in a row correctly to earn the Boss Badge. These are multi-step state-test style challenges.</p><button onclick="bossChallenge()">Enter Boss Level</button></div>`:''}</div></div>`;}
function bossChallenge(){currentPractice=practice.filter(q=>q.diff>=4)[Math.floor(Math.random()*practice.filter(q=>q.diff>=4).length)]; attempts=0; selected=null; if(!state.badges.includes('Boss Challenger'))state.badges.push('Boss Challenger'); save(); render();}
function renderProgress(){let total=state.practiceAnswers.length, correct=state.practiceAnswers.filter(x=>x.correct).length; document.getElementById('progress').innerHTML=`<div class="grid"><div class="card third"><h2>Current Streak</h2><p class="big">${state.streak}</p></div><div class="card third"><h2>Practice Accuracy</h2><p class="big">${total?Math.round(correct/total*100):0}%</p></div><div class="card third"><h2>Badges</h2>${['First Try Focus','Boss Level Unlocked','Boss Challenger'].map(b=>`<span class="badge ${state.badges.includes(b)?'earned':''}">${b}</span>`).join('')}</div><div class="card"><button class="danger" onclick="resetAll()">Reset Local Data</button></div></div>`;}
function render(){renderStudent();renderTutor();renderPractice();renderProgress();}
render();
</script></body></html>
